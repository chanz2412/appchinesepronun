<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luyện Phát Âm Tiếng Trung</title>

<style> 
    .logo{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin-bottom:15px;
}

.flag{
    font-size:40px;
}

.logo h1{
    margin:0;
    color:#444;
}

.goal{
    background:#f7f7f7;
    border:2px solid #e0e0e0;
    border-radius:12px;
    padding:12px;
    margin-bottom:20px;
}

.goal h3{
    color:#333;
    margin-bottom:5px;
}

.goal p{
    color:#666;
}
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f2f2f2;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:90%;
    max-width:700px;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    text-align:center;
}

h1{
    color:#444;
    margin-bottom:20px;
}

.chinese{
    font-size:50px;
    font-weight:bold;
    color:#222;
    margin-bottom:10px;
}

.pinyin{
    font-size:26px;
    color:#777;
    margin-bottom:10px;
}

.vietnamese{
    font-size:22px;
    color:#555;
    margin-bottom:25px;
}

button{
    background:#e5e5e5;
    border:none;
    padding:12px 25px;
    margin:8px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

button:hover{
    background:#d4d4d4;
}

.score{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
}

.meme{
    margin-top:20px;
    display:none;
}

.meme img{
    width:250px;
    border-radius:15px;
}

.result{
    margin-top:10px;
    font-size:24px;
    font-weight:bold;
}
</style>
</head>
<body>
    <h3>🇨🇳 Kaoshi Chinese</h3>
    <p>🎯 Mục tiêu: Hoàn thành 10 câu phát âm hôm nay</p>
</div>

<h2>Luyện Phát Âm Tiếng Trung</h2>

    <div class="chinese" id="hanzi">你好</div>
    <div class="pinyin" id="pinyin">nǐ hǎo</div>
    <div class="vietnamese" id="viet">Xin chào</div>

    <button onclick="speakChinese()">🔊 Nghe mẫu</button>
    <button onclick="startRecognition()">🎤 Đọc lại</button>
    <button onclick="nextSentence()">➡ Câu tiếp theo</button>

    <div class="score" id="score"></div>

    <div class="meme" id="meme">
        <img id="memeImg" src="">
        <div class="result" id="result"></div>
    </div>

</div>

<script>

const lessons = [
{
hanzi:"你好",
pinyin:"nǐ hǎo",
viet:"Xin chào"
},
{
hanzi:"谢谢",
pinyin:"xiè xie",
viet:"Cảm ơn"
},
{
hanzi:"再见",
pinyin:"zài jiàn",
viet:"Tạm biệt"
},
{
hanzi:"我爱你",
pinyin:"wǒ ài nǐ",
viet:"Anh yêu em"
},
{
hanzi:"今天天气很好",
pinyin:"jīn tiān tiān qì hěn hǎo",
viet:"Hôm nay thời tiết rất đẹp"
}
];

let current = 0;

function loadLesson(){
document.getElementById("hanzi").innerText=lessons[current].hanzi;
document.getElementById("pinyin").innerText=lessons[current].pinyin;
document.getElementById("viet").innerText=lessons[current].viet;
document.getElementById("score").innerText="";
document.getElementById("meme").style.display="none";
}

function nextSentence(){
current++;
if(current>=lessons.length){
current=0;
}
loadLesson();
}

function speakChinese(){

let utterance = new SpeechSynthesisUtterance(
lessons[current].hanzi
);

utterance.lang="zh-CN";

speechSynthesis.speak(utterance);
}

function startRecognition(){

if(!('webkitSpeechRecognition' in window)){
alert("Trình duyệt không hỗ trợ nhận diện giọng nói.");
return;
}

let recognition = new webkitSpeechRecognition();

recognition.lang='zh-CN';
recognition.start();

recognition.onresult = function(event){

let speech = event.results[0][0].transcript;

let target = lessons[current].hanzi;

let score = similarity(speech,target);

document.getElementById("score").innerHTML=
`Bạn đọc: ${speech}<br>Điểm: ${score}%`;

showResult(score);
}
}

function similarity(a,b){

a=a.toLowerCase();
b=b.toLowerCase();

let same=0;

for(let i=0;i<Math.min(a.length,b.length);i++){
if(a[i]===b[i]){
same++;
}
}

return Math.round(
same/Math.max(a.length,b.length)*100
);
}

function showResult(score){

let meme=document.getElementById("meme");
let img=document.getElementById("memeImg");
let result=document.getElementById("result");

meme.style.display="block";

if(score>=70){

img.src="https://i.imgur.com/tA6KXK5.png";

result.innerHTML=
"😎 Chuẩn rồi đó!";

}else{

img.src="https://i.imgur.com/MxQ6hF8.png";

result.innerHTML=
"😡 Đọc lại đi bạn ơi!";
}
}

loadLesson();

</script>

</body>
</html>
